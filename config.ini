; 29 jun 25
; I found SymbolDetails has PipPosition
; If PipPosition is 0
; Means, 1 pip changes, is result in price 1.0 changes
; Example:
; PipPosition 0, Price is 3000.0
; 3000.0 + 1 pip = 3001.0
; Hence, I will write like this `PipPosition 0 = 1.0`
; Hence,
; PipPosition 0 = 1.0
; PipPosition 1 = 0.1
; PipPosition 2 = 0.01
